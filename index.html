<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator">
        <header class="calc-header">
            <h1>Calculator</h1>
            <p>Simple, clean, and fast.</p>
        </header>
        <input id="display" type="tel" placeholder="Enter number" autocomplete="off">
        <div class="btn">
            <button>C</button>
            <button>7</button>
            <button>6</button>
            <button>5</button>
            <button >+</button>
            <button>4</button>
            <button>3</button>
            <button>2</button>
            <button >-</button>
            <button>1</button>
            <button>0</button>
            <button>%</button>
            <button>x</button>
            <button>.</button>
            <button onclick="calculate()" > = </button>
        </div>
        <footer class="calc-footer">Built for quick keyboard-free math.</footer>
    </main>


    <script src="index.js"></script>
</body>
</html>
